
<!DOCTYPE html>
<html>
<head>
    <title>Manikandan | Pro Site</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #000000, #0f2027);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            color: cyan;
        }

        .cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .card {
            background: #111;
            width: 200px;
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.1);
            background: cyan;
            color: black;
        }

        .section {
            display: none;
            padding: 40px;
            animation: fade 0.5s;
        }

        @keyframes fade {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        #home {
            display: block;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: cyan;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Manikandan 🚀</h1>

<div class="cards">
    <div class="card" onclick="show('home')">🏠 Home</div>
    <div class="card" onclick="show('about')">👤 About</div>
    <div class="card" onclick="show('contact')">📞 Contact</div>
</div>

<div id="home" class="section">
    <h2>Welcome</h2>
    <p>This is my modern interactive website 🔥</p>
</div>

<div id="about" class="section">
    <h2>About Me</h2>
    <p>I am Manikandan, learning web development and creating cool designs.</p>
</div>

<div id="contact" class="section">
    <h2>Contact</h2>
    <p>Email: yourname@gmail.com</p>
</div>

<script>
function show(id) {
    let sections = document.querySelectorAll('.section');
    sections.forEach(s => s.style.display = 'none');

    document.getElementById(id).style.display = 'block';
}
</script>

</body>
</html>
